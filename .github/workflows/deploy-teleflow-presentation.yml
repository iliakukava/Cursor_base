# Публикует статическую презентацию из assist-final-project/presentation в GitHub Pages.
# После первого успешного запуска: Settings → Pages → виден URL (обычно https://<user>.github.io/<repo>/).

name: Deploy TeleFlow presentation

on:
  push:
    branches: [main, master]
    paths:
      - "assist-final-project/presentation/**"
      - ".github/workflows/deploy-teleflow-presentation.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-teleflow-presentation
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: assist-final-project/presentation

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
